name: CI — social_consensus_backend

on:
  push:
    branches: [staging, dev-Marlow, main]
  pull_request:
    branches: [dev-Marlow, main]

env:
  DB_NAME: centinela_test
  DB_USER: centinela
  DB_PASSWORD: testpass123
  DB_HOST: localhost
  DB_PORT: "5432"
  SECRET_KEY: ci-test-secret-not-for-production
  REDIS_HOST: localhost
  REDIS_PORT: "6379"
  DEBUG: "True"
  DJANGO_SETTINGS_MODULE: project.settings

jobs:
  # ── Unitarios ──────────────────────────────────────────────────────────────
  test-unit:
    name: Pruebas unitarias
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: centinela_test
          POSTGRES_USER: centinela
          POSTGRES_PASSWORD: testpass123
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Instalar dependencias
        run: pip install -q -r requirements.txt pytest pytest-django pytest-cov
      - name: Ejecutar tests unitarios
        run: |
          pytest apps/ -v --tb=short --no-migrations \
            --junitxml=report-unit.xml \
            --cov=apps --cov-report=term --cov-report=xml:coverage-unit.xml
      - name: Subir resultados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            report-unit.xml
            coverage-unit.xml

  # ── Integración ────────────────────────────────────────────────────────────
  test-integration:
    name: Pruebas de integración
    runs-on: ubuntu-latest
    needs: test-unit
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: centinela_test
          POSTGRES_USER: centinela
          POSTGRES_PASSWORD: testpass123
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:6
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Instalar dependencias
        run: pip install -q -r requirements.txt pytest pytest-django pytest-cov
      - name: Ejecutar tests de integración
        run: |
          pytest apps/ -v --tb=short --no-migrations -m integration \
            --junitxml=report-integration.xml \
            --cov=apps --cov-report=term --cov-report=xml:coverage-integration.xml
      - name: Subir resultados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: |
            report-integration.xml
            coverage-integration.xml

  # ── Docker build ───────────────────────────────────────────────────────────
  build-docker:
    name: Build imagen Docker
    runs-on: ubuntu-latest
    needs: test-integration
    if: github.ref == 'refs/heads/dev-Marlow' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build imagen
        run: docker build -t social_consensus_backend:${{ github.sha }} .
      - name: Verificar imagen
        run: docker images social_consensus_backend
