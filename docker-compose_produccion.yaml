# Uso sugerido:
# docker compose --env-file .env_produccion -f docker-compose_produccion.yaml up -d

services:
  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 project.asgi:application
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env_produccion
        required: false
    environment:
      - DJANGO_SETTINGS_MODULE=project.settings
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - social_media:/app/apps/media
    networks:
      centinela-net:
        aliases:
          - social-consensus-web

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME:-centinela_social}
      - POSTGRES_USER=${DB_ADMIN_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_ADMIN_PASSWORD:-change-me-strong-db-admin-password}
    command: postgres -c shared_preload_libraries=vector
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_ADMIN_USER:-postgres} -d ${DB_NAME:-centinela_social}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      centinela-net:
        aliases:
          - social-postgres

  redis:
    image: redis:6
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change-me-strong-redis-password}
    command:
      - /bin/sh
      - -c
      - exec redis-server /usr/local/etc/redis/redis.conf --requirepass "$${REDIS_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      centinela-net:
        aliases:
          - social-redis

  celery_worker:
    build: .
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: celery -A project worker -l info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env_produccion
        required: false
    environment:
      - DJANGO_SETTINGS_MODULE=project.settings
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - social_media:/app/apps/media
    networks:
      - centinela-net

  celery_beat:
    build: .
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: celery -A project beat -l info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env_produccion
        required: false
    environment:
      - DJANGO_SETTINGS_MODULE=project.settings
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - social_media:/app/apps/media
    networks:
      - centinela-net

volumes:
  postgres_data:
    name: centinela_social_postgres_data
  social_media:
    name: centinela_social_media

networks:
  centinela-net:
    external: true
